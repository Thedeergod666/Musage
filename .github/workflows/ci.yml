name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── action 全部钉到 commit SHA,避免上游 major 升级突然改语义 ──
# 更新时跑 `git ls-remote <repo> refs/tags/vX.Y.Z` 拿新 SHA,保留同 minor
#   actions/checkout           v4.3.1 → 34e114876b0b11c390a56381ad16ebd13914f8d5
#   actions/setup-node         v4.4.0 → 49933ea5288caeca8642d1e84afbd3f7d6820020
#   pnpm/action-setup          v4.4.0 → fc06bc1257f339d1d5d8b3a19a8cae5388b55320
#   actions/cache              v4.3.0 → 0057852bfaa89a56745cba8c7296529d2fc39830
#   Swatinem/rust-cache        v2.9.1 → c19371144df3bb44fab255c43d04cbc2ab54d1c4
#   actions/upload-artifact    v4.6.2 → ea165f8d65b6e75b540449e92b4886f43607fa02
#   actions/download-artifact  v4.3.0 → d3f86a106a0bac45b974a628896c90dbdf5c8093
#   dtolnay/rust-toolchain     stable → 29eef336d9b2848a0b548edc03f92a220660cdb8

jobs:
  # ── 前端:类型 + 编译 ──
  frontend:
    name: frontend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        # 钉到 9.15.4,跟 package.json 的 packageManager 严格对齐,避免 corepack 报 mismatch
        with: { version: 9.15.4 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          # ⚠ 不要用 `cache: "pnpm"` —— v4.4.0 内部调 setup-pnpm 取 store path,
          # bundle pnpm 跟 pnpm 9.15.4 config 不兼容,抛 "packages field missing or empty"
          # 改用手动的 actions/cache 缓存 pnpm store
      - name: Cache pnpm store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          # 覆盖三大平台的 pnpm 默认 store 路径(macOS/Linux 是 XDG,Windows 是 LOCALAPPDATA)
          path: |
            ~/.local/share/pnpm/store
            ~/Library/pnpm/store
            ~/AppData/Local/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm build          # tsc + vite build,不出 bundle
      # 跨平台一致性补丁(三件套,全 idempotent):
      #   1) 剥 UTF-8 BOM —— Windows 上 Node fs.writeFileSync(text, 'utf-8') 偶发会
      #      写 BOM 头 3 字节 0xEF 0xBB 0xBF,跟 *nix 上无 BOM 输出差 3 字节
      #   2) 剥 CR —— esbuild minifier 在 Windows 上偶发在 minified JS/CSS
      #      里保留 \r,跟 *nix 输出 diff
      #   3) 反 double-UTF-8 —— Vite/Rollup 的 HTML plugin(transform hook)在
      #      Windows 上把源 .html 当 Latin-1 解读再当 UTF-8 重编码(CI 18
      #      撞过),把 "用" (UTF-8 0xE7 0x88 0x91) 写成 0xC3 0xA7 0xC2 0x94
      #      0xC2 0xA8(3 倍体积)。启发式:读 UTF-8 后看所有 code point 是不是
      #      都 ≤ 0xFF,如果是说明 double-UTF-8,再用 Latin-1 编码回去得到
      #      "原 bytes" 写回。Linux/macOS 文件 Chinese chars > 0xFF,跳过不动
      # 文本类后缀才处理,png/woff2 等二进制里的 0x0d 是合法字节不能动
      - name: Normalize dist (BOM/CR strip + undo double-UTF-8)
        run: node scripts/normalize-dist.cjs
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist-${{ matrix.os }}
          path: dist
          retention-days: 3

  # ── 后端:cargo check(不动 bundle,省时间)──
  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      # Tauri 2 在 Linux 链接 webkit2gtk 等系统库。ubuntu-latest runner 默认没装,
      # 不装的话 cargo check 在解析 `tauri` 的 build script 时就死(< 20s 挂),
      # 表现就是 CI 一直 fail 但本地 Win/macOS 没事。
      - name: Install Linux system deps (Tauri 2)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # tauri::generate_context!() 宏 cargo check 时就验 frontendDist = "../dist" 存在
      # 本地 pnpm tauri build 隐式跑了 pnpm build,CI 单独跑 cargo check 没这步 → 编译期 panic
      # 显式加 pnpm install + pnpm build 让 dist/ 存在
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with: { version: 9.15.4 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # v2 语法:只给路径,不要 v1 的 `path -> target` 箭头 —— 那个会被静默忽略
          workspaces: src-tauri
      - name: cargo check
        working-directory: src-tauri
        # ⚠ --locked 必加: 不加的话 fresh cargo 在不同平台可能重解析,
        # 把 Cargo.lock 里没的 alloc-no-stdlib 3.0.0 拉进来,撞 brotli 8.0.3 的 2.0.4 trait
        run: cargo check --locked --all-targets
        env:
          # CI 上没必要开 macos-private-api,省 objc2 链接
          RUSTFLAGS: ""
      - name: cargo test
        # 2026-06-22 收紧 CI: 之前 `cargo test --locked --no-run` 只编译不跑,
        # 10 个 pre-existing broken test (rust 1.96 升级后 RwLock::get 弃用 +
        # i18n 切换后中文 hard-code 断言破裂) 全部看不见, CI 假绿。
        # 改 `cargo test --locked` 真正跑测试, 失败立刻红。
        # ci.yml:128 历史 commit `06d8821` 已经修 188 个 test 全绿。
        working-directory: src-tauri
        run: cargo test --locked
      - name: cargo fmt --check
        # 强制 fmt: PR 引入未格式化代码立刻红。`fmt` 不在 toolchain 默认装,
        # rustup component add rustfmt 装一次。
        working-directory: src-tauri
        run: |
          rustup component add rustfmt || true
          cargo fmt --all -- --check
      - name: cargo clippy
        # 2026-06-22 加 clippy 守门: 项目之前从未跑过 clippy, 累积 37 个
        # style 警告 (mostly unnecessary_to_owned / too_many_arguments /
        # needless_borrow 等), 一次性清不完。先用 `cargo clippy` 默认 (warning
        # 不 fail), 让 PR 后续慢慢消解。未来 PR 4-6 大重构后改 -D warnings 一次锁死。
        working-directory: src-tauri
        run: |
          rustup component add clippy || true
          cargo clippy --locked --all-targets
      - name: tsc --noEmit
        # 前端类型守门: tsc 不跑 vite, 只 type check。
        # 跟 pnpm build (tsc + vite) 区别: 这里失败不产物, 速度更快更明确。
        run: pnpm exec tsc --noEmit

  # ── 前端构建产物在所有平台保持一致:对比 hash ──
  frontend-consistency:
    name: frontend consistency
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      # v4 download-artifact 拿掉了 pattern 参数,最稳的是逐个 artifact 显式下载
      # 用 dl/ 前缀避免跟 src 的 dist 路径冲突
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with: { name: dist-ubuntu-latest, path: dl/dist-ubuntu-latest }
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with: { name: dist-macos-latest, path: dl/dist-macos-latest }
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with: { name: dist-windows-latest, path: dl/dist-windows-latest }
      - name: Compare hashes
        run: |
          # 显式 per-platform 算 hash,不用 glob 避免路径拼接 bug
          HASH_UBUNTU=$(cd dl/dist-ubuntu-latest && find . -type f | sort | xargs sha256sum | sha256sum)
          HASH_MACOS=$(cd dl/dist-macos-latest && find . -type f | sort | xargs sha256sum | sha256sum)
          HASH_WINDOWS=$(cd dl/dist-windows-latest && find . -type f | sort | xargs sha256sum | sha256sum)
          {
            echo "ubuntu: $HASH_UBUNTU"
            echo "macos:  $HASH_MACOS"
            echo "windows: $HASH_WINDOWS"
          }
          if [ "$HASH_UBUNTU" = "$HASH_MACOS" ] && [ "$HASH_UBUNTU" = "$HASH_WINDOWS" ]; then
            echo "✓ 三大平台 dist 完全一致"
            exit 0
          fi
          # ── 失败诊断:逐文件 dump 三个平台的 sha256 ──
          # 翻转成 path|<pipe>hash(用 | 而不是 tab —— BSD join 不吃 tab)
          echo "::error::frontend dist differs across OS —— 打印逐文件 hash"
          for plat in ubuntu macos windows; do
            ( cd "dl/dist-${plat}-latest" \
              && find . -type f -print0 \
                | xargs -0 sha256sum \
                | awk '{ printf "%s|%s\n", $2, $1 }' \
                | sort \
            ) > "/tmp/m-${plat}.tsv"
          done
          echo "─── 文件列表差异 (ubuntu vs windows) ───"
          diff <(cut -d'|' -f1 /tmp/m-ubuntu.tsv) <(cut -d'|' -f1 /tmp/m-windows.tsv) \
            && echo "(文件列表完全相同 → 差异在文件内容)" \
            || echo "(文件列表本身就不同 → 见上方 diff)"
          echo "─── 文件列表差异 (ubuntu vs macos) ───"
          diff <(cut -d'|' -f1 /tmp/m-ubuntu.tsv) <(cut -d'|' -f1 /tmp/m-macos.tsv) \
            && echo "(文件列表完全相同 → 差异在文件内容)" \
            || echo "(文件列表本身就不同 → 见上方 diff)"
          echo "─── 逐文件 sha256 比对 (列:path | ubuntu | macos | windows) ───"
          # 三路 join:先 ubuntu × macos 拼出 path|u|m,再 × windows 拼出 path|u|m|w
          # → $2=u, $3=m, $4=w(顺序跟 label 对得上,不会标反)
          join -a 1 -a 2 -e "---MISSING---" -t '|' -o '0,1.2,2.2' \
            /tmp/m-ubuntu.tsv /tmp/m-macos.tsv \
            | join -a 1 -a 2 -e "---MISSING---" -t '|' -o '0,1.2,1.3,2.2' \
              - /tmp/m-windows.tsv \
            | awk -F'|' '{
                ok = ($2 == $3 && $2 == $4);
                tag = ok ? "✓" : "✗";
                printf "  %s %-50s u=%s  m=%s  w=%s\n", tag, $1, substr($2,1,12), substr($3,1,12), substr($4,1,12);
              }'
          echo ""
          echo "─── 差异文件实际内容 (全文 + head/tail hex; diff -u 跨平台对照) ───"
          join -a 1 -a 2 -e "---MISSING---" -t '|' -o '0,1.2,2.2' \
            /tmp/m-ubuntu.tsv /tmp/m-macos.tsv \
            | join -a 1 -a 2 -e "---MISSING---" -t '|' -o '0,1.2,1.3,2.2' \
              - /tmp/m-windows.tsv \
          | awk -F'|' '$2 != $3 || $2 != $4 { print $1 }' \
          | while IFS= read -r f; do
              echo ""
              echo "############################################################"
              echo "## $f"
              echo "############################################################"
              for plat in ubuntu macos windows; do
                fp="dl/dist-${plat}-latest/${f#./}"
                if [ -f "$fp" ]; then
                  SZ=$(wc -c < "$fp")
                  HEAD=$(head -c 16 "$fp" | od -An -tx1 | tr -d ' \n')
                  TAIL=$(tail -c 16 "$fp" | od -An -tx1 | tr -d ' \n')
                  echo ""
                  echo "  ── ${plat} (size=${SZ}B, head16=0x${HEAD}, tail16=0x${TAIL}) ──"
                fi
              done
              # 跨平台 diff -u (如果 ubuntu==macos 就只对 ubuntu vs windows)
              if diff -q dl/dist-ubuntu-latest/"${f#./}" dl/dist-macos-latest/"${f#./}" >/dev/null 2>&1; then
                echo ""
                echo "▍ ubuntu vs windows diff -u (macos 同 ubuntu):"
                diff -u dl/dist-ubuntu-latest/"${f#./}" dl/dist-windows-latest/"${f#./}" || true
                echo ""
                echo "▍ windows 文件 hex dump (od -c 显示原始字节):"
                od -c dl/dist-windows-latest/"${f#./}" | head -40
              else
                echo ""
                echo "▍ ubuntu vs macos diff -u:"
                diff -u dl/dist-ubuntu-latest/"${f#./}" dl/dist-macos-latest/"${f#./}" || true
                echo ""
                echo "▍ ubuntu vs windows diff -u:"
                diff -u dl/dist-ubuntu-latest/"${f#./}" dl/dist-windows-latest/"${f#./}" || true
                echo ""
                echo "▍ macos 文件 hex dump:"
                od -c dl/dist-macos-latest/"${f#./}" | head -40
                echo ""
                echo "▍ windows 文件 hex dump:"
                od -c dl/dist-windows-latest/"${f#./}" | head -40
              fi
            done
          exit 1
