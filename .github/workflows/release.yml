name: Release

# ──────────────────────────────────────────────────────────────
# 触发：
#   1) 推送 v*.*.* 标签（v0.1.0 / v1.2.3-rc.1 之类）
#   2) Actions 页手动 Run workflow（输入版本号）
# ──────────────────────────────────────────────────────────────
on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（不带 v 前缀）"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────
  # 平台构建 + 发布矩阵
  #
  # 每个 target 跑一次 tauri build，tauri-action 负责：
  #   - 拿 TAURI_SIGNING_PRIVATE_KEY 自动签 bundle
  #   - 产物落到 target/<target>/release/bundle/
  #   - 在第一个跑完的 job 里创建 GitHub Release
  #   - 把所有 bundle + latest.json 上传成 release assets
  #     (latest.json 里的 url 字段会被填成真实 asset 地址)
  # ────────────────────────────────────────────────────────
  build:
    name: build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # ── Node / pnpm ──
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 9.15.4
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "pnpm"

      # ── Rust 工具链 ──
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          shared-key: ${{ matrix.target }}

      # ── macOS objc2 需要明确最低部署版本 ──
      - name: Set macOS deployment target
        if: runner.os == 'macOS'
        run: echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> $GITHUB_ENV

      # ── 注入版本号到 tauri.conf.json，再触发 sync-version.cjs 同步到另外两份 ──
      - name: Sync version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "Building Musage v${VERSION} for ${{ matrix.target }}"

          # 用 Node 而不是 sed，更可靠（tauri.conf.json 含嵌套 JSON）
          node -e "
            const fs = require('fs');
            const p = 'src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(p, 'utf8'));
            c.version = '${VERSION}';
            fs.writeFileSync(p, JSON.stringify(c, null, 2) + '\n');
          "

          # 同步到 package.json + Cargo.toml
          pnpm sync-version

      # ── 前端依赖 ──
      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # ── 真正的打包 + release（tauri-action 接管）──
      #
      # tauri-action 会：
      #   1) 调 `tauri build --target ${{ matrix.target }}`
      #   2) 第一个完成 build 的 job 创建 GitHub Release
      #   3) 所有 job 完成后把 bundles + latest.json 上传到 release
      #
      # 关键 env：
      #   - TAURI_SIGNING_PRIVATE_KEY    : 私钥（base64 编码），用于签 manifest
      #   - TAURI_SIGNING_PRIVATE_KEY_PASSWORD : 私钥密码（无密码留空）
      #   - APPLE_*  : macOS 签名 + 公证
      #   - WINDOWS_CERTIFICATE_*        : Windows EV 签名
      #
      # 没配对应 secret 就跳过对应平台签名，bundle 仍能出来
      - name: Tauri build & release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0 (latest v0.X)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── Tauri updater 签名（生成 latest.json 的 signature 字段）──
          # 没配 TAURI_SIGNING_PRIVATE_KEY → latest.json 不带 signature，updater 跳过签名校验
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # ── macOS 签名 + 公证（可选）──
          # 没配有效证书就不要传 APPLE_*，否则 tauri-cli 会尝试 import 空证书到 keychain 报错
          # 需要签名时：在 GitHub repo Settings → Secrets 配好 6 个 APPLE_* 再取消下面注释
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # ── Windows EV 签名（可选）──
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          # 不让 action 自己写 tagName：用本 workflow 触发的 tag
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', inputs.version) }}
          releaseName: "Musage ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', inputs.version) }}"
          releaseDraft: true
          releaseBody: .github/RELEASE_TEMPLATE.md
          # 强制更新器：每个 target 跑 tauri build 时自动生成 latest.json（默认 true）
          # tauri CLI 内部产出,action 原样上传为 release asset,这里不用也不能传模板
          includeUpdaterJson: true
          args: --target ${{ matrix.target }}

  # ────────────────────────────────────────────────────────
  # 验证 job：build 完后跑一次 cargo check 验证 manifest 路径
  #（tauri-action 已经处理了 release 创建，这里只是 sanity check）
  # ────────────────────────────────────────────────────────
  verify:
    name: verify release assets
    needs: build
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Wait a moment for release
        run: sleep 15
      - name: Verify latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', inputs.version) }}"
          echo "验证 release $TAG 是否包含 latest.json + 三个平台的 bundle"
          gh release view "$TAG" --json assets --jq '.assets[].name' | sort
          gh release view "$TAG" --json assets --jq '.assets[].name' | grep -q "latest.json" \
            || (echo "::error::latest.json 没找到"; exit 1)
          echo "✓ latest.json 已上传"
