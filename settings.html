<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Musage · 设置</title>
  </head>
  <body>
    <div class="app-shell">
      <!-- 顶部 header -->
      <header class="app-header">
        <span class="app-title">⚙ Musage · 设置</span>
      </header>

      <!-- 左侧导航 -->
      <aside id="nav" class="nav">
        <button class="nav-item active" data-section="providers">
          <span class="nav-dot"></span>
          <span class="nav-label">数据源</span>
        </button>
        <button class="nav-item" data-section="floating">
          <span class="nav-dot"></span>
          <span class="nav-label">浮窗</span>
        </button>
        <button class="nav-item" data-section="app">
          <span class="nav-dot"></span>
          <span class="nav-label">应用</span>
        </button>
        <button class="nav-item" data-section="advanced">
          <span class="nav-dot"></span>
          <span class="nav-label">高级</span>
        </button>
        <button class="nav-item" data-section="logs">
          <span class="nav-dot"></span>
          <span class="nav-label">日志</span>
        </button>
        <button class="nav-item" data-section="about">
          <span class="nav-dot"></span>
          <span class="nav-label">关于</span>
        </button>
      </aside>

      <!-- 主区：每个 section 一个容器，由 main.ts 调对应 render 函数填充 -->
      <main id="main" class="main">
        <div class="section-view" data-section="providers"></div>
        <div class="section-view" data-section="floating" hidden></div>
        <div class="section-view" data-section="app" hidden></div>
        <div class="section-view" data-section="advanced" hidden></div>
        <div class="section-view" data-section="logs" hidden></div>
        <div class="section-view" data-section="about" hidden></div>
      </main>
    </div>

    <!-- 全局 flash（仅 schema overrides 整段错误等全局事件用） -->
    <div class="flash" id="flash"></div>

    <script type="module" src="/src/settings.ts"></script>
  </body>
</html>
