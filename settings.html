<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Musage · 设置</title>
  </head>
  <body>
    <div class="app-shell">
      <!-- 顶部 header -->
      <header class="app-header">
        <span class="app-title">⚙ Musage · 设置</span>
      </header>

      <!-- 左侧导航 -->
      <aside id="nav" class="nav">
        <button class="nav-item active" data-section="providers">
          <span class="nav-dot" data-id="any"></span>
          <span class="nav-label">数据源</span>
        </button>
        <button class="nav-item" data-section="floating">
          <span class="nav-dot" data-id="any"></span>
          <span class="nav-label">浮窗</span>
        </button>
        <button class="nav-item" data-section="app">
          <span class="nav-dot" data-id="any"></span>
          <span class="nav-label">应用</span>
        </button>
        <button class="nav-item" data-section="advanced">
          <span class="nav-dot" data-id="any"></span>
          <span class="nav-label">高级</span>
        </button>
        <button class="nav-item" data-section="logs">
          <span class="nav-dot" data-id="any"></span>
          <span class="nav-label">日志</span>
        </button>
        <button class="nav-item" data-section="about">
          <span class="nav-dot" data-id="any"></span>
          <span class="nav-label">关于</span>
        </button>
      </aside>

      <!-- 主区：每个 section 一个容器，Stage 3 只有 providers 有内容（来自 legacy template） -->
      <main id="main" class="main">
        <div class="section-view" data-section="providers"></div>
        <div class="section-view" data-section="floating" hidden>
          <div class="section-empty">浮窗设置（即将在 Stage 4-5 实现）</div>
        </div>
        <div class="section-view" data-section="app" hidden>
          <div class="section-empty">应用设置（即将在 Stage 4-5 实现）</div>
        </div>
        <div class="section-view" data-section="advanced" hidden>
          <div class="section-empty">高级设置（即将在 Stage 4-5 实现）</div>
        </div>
        <div class="section-view" data-section="logs" hidden>
          <div class="section-empty">日志（即将在 Stage 4-5 实现）</div>
        </div>
        <div class="section-view" data-section="about" hidden>
          <div class="section-empty">关于（即将在 Stage 4-5 实现）</div>
        </div>
      </main>
    </div>

    <!-- 全局 flash（仅 schema overrides 整段错误等全局事件用） -->
    <div class="flash" id="flash"></div>

    <!--
      遗留 DOM 模板：Stage 3 把 v0.5.x 整个 settings.html body 内容搬进这里，
      由 main.ts 在 init 时 clone 进 .section-view[data-section="providers"]。
      保留所有 #id / .class 让 settings/* 子模块继续工作 —— Stage 4-5 拆
      成真正的 6 个 section 后这个 template 就可以删了。
    -->
    <template id="legacy-providers">
      <!-- 5 个 provider panel 改由 src/settings/providers.ts 动态渲染 (Stage 4 起) -->
      <!-- 日志 -->
      <details class="logs" id="logs-section" open>
        <summary>📋 日志（应用运行日志，最近 200 条）</summary>
        <div class="help">
          浮窗右上角红点 = 最近一次拉取报错。点击此处查看具体内容。
          持久错误也都会记下来便于排查（去重窗口 60s / 同一 provider + kind）。
        </div>
        <div class="row row-tight">
          <select id="logs-filter" class="logs-filter" title="筛选日志级别">
            <option value="all">全部</option>
            <option value="error">仅报错</option>
            <option value="warn">仅警告</option>
            <option value="info">仅信息</option>
          </select>
          <button id="logs-refresh" class="primary">刷新</button>
          <button id="logs-copy" class="primary" title="复制当前筛选后的日志到剪贴板">复制</button>
          <button id="logs-clear" class="danger">清空</button>
          <span id="logs-count"></span>
        </div>
        <div class="logs-list" id="logs-list">
          <div class="logs-empty">— 暂无日志 —</div>
        </div>
      </details>

      <div class="divider"></div>

      <!-- Schema overrides -->
      <details class="overrides">
        <summary>🔧 Schema overrides（高级 · MiniMax 改字段名后填这里）</summary>
        <div class="help">
          只在 <strong>解析失败 / 显示 "Schema 未知"</strong> 时用。每行一个 JSON 对象，<code>total</code> + <code>remaining</code> 同时存在才算命中，<code>end</code> 可选。
          改完点"保存配置"。参考 ccswitch 的 schema 字段名逆向。
        </div>
        <div class="field">
          <label>MiniMax · 5h 候选字段名</label>
          <textarea id="overrides-5h-minimax" rows="3" placeholder='[{"total":"...","remaining":"...","end":"..."}]'></textarea>
        </div>
        <div class="field">
          <label>MiniMax · 周 候选字段名</label>
          <textarea id="overrides-weekly-minimax" rows="3" placeholder='[{"total":"...","remaining":"...","end":"..."}]'></textarea>
        </div>
        <div class="field">
          <label>Xiaomi MiMo · 月度 候选字段名</label>
          <textarea id="overrides-monthly-xiaomimimo" rows="3" placeholder='[{"total":"...","remaining":"...","end":"..."}]'></textarea>
        </div>
      </details>

      <div class="divider"></div>

      <!-- 全局设置 -->
      <div class="field">
        <label>刷新间隔（秒）</label>
        <input id="interval" type="number" min="10" max="3600" value="60" />
        <div class="help">最少 10 秒，默认 60。对所有 provider 同时生效。</div>
      </div>

      <div class="field">
        <div class="check">
          <input id="autostart" type="checkbox" />
          <label for="autostart">开机自启</label>
        </div>
      </div>

      <div class="divider"></div>

      <div class="provider-section">
        <h2>🪟 浮窗</h2>
        <div class="field">
          <label>置顶 / 置底 行为</label>
          <div class="pin-mode">
            <label class="pin-opt">
              <input type="radio" name="pin-mode" value="pin_top" checked />
              <span class="pin-opt-body">
                <span class="pin-opt-title">📌 始终置顶</span>
                <span class="pin-opt-desc">浮窗永远在最上层，不被其它窗口盖住</span>
              </span>
            </label>
            <label class="pin-opt">
              <input type="radio" name="pin-mode" value="pin_bottom" />
              <span class="pin-opt-body">
                <span class="pin-opt-title">⬇ 置底，鼠标 hover 时置顶</span>
                <span class="pin-opt-desc">默认在底部，鼠标进入浮窗时自动浮上来</span>
              </span>
            </label>
            <label class="pin-opt">
              <input type="radio" name="pin-mode" value="normal" />
              <span class="pin-opt-body">
                <span class="pin-opt-title">🔓 普通窗口</span>
                <span class="pin-opt-desc">不强制层级，跟普通窗口一样</span>
              </span>
            </label>
          </div>
          <div class="help">改动会立即生效（不需要点"保存配置"），并写入 config.json 下次启动恢复。</div>
        </div>
        <div class="field">
          <div class="row">
            <button id="reset-floating" class="primary">归位到主屏幕正中央</button>
          </div>
          <div class="help">
            浮窗位置 + 大小已经自动记忆，下次启动恢复。点"归位"可把窗口挪到当前主屏幕正中央。
          </div>
        </div>
        <div class="field">
          <div class="check">
            <input id="low-power-mode" type="checkbox" />
            <label for="low-power-mode">省电模式（关闭玻璃模糊 + 过渡动画）</label>
          </div>
          <div class="help">
            老 Intel Mac / Linux WebKitGTK 等 GPU 弱的平台开启可显著减少 backdrop-filter 开销。
            视觉上 idle 状态会丢失玻璃质感，hover 仍保留色彩切换。改动会立即生效。
          </div>
        </div>
        <div class="field">
          <div class="check">
            <input id="auto-hide-in-fullscreen" type="checkbox" />
            <label for="auto-hide-in-fullscreen">全屏时自动隐藏浮窗</label>
          </div>
          <div class="help">
            检测到任何 app 进入全屏（菜单栏自动隐藏）→ 浮窗暂时隐藏；退出全屏 → 自动恢复。
            目前仅 macOS 生效（通过 NSMenu.menuBarVisible 探测）。
            <br/>⚠ 若你在「系统设置 → 桌面与程序坞 → 在桌面上自动隐藏并显示菜单栏」开了，可能会被误触发。
          </div>
        </div>
      </div>

      <div class="row">
        <button id="test" class="primary">测试连接</button>
        <button id="save">保存配置</button>
      </div>
    </template>

    <script type="module" src="/src/settings.ts"></script>
  </body>
</html>
